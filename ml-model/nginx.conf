events {
    worker_connections 1024;
}

http {
    # Upstream pool — add replicas here when you scale
    upstream housing_api {
        least_conn;               # route to worker with fewest active connections
        server api:8000;
        # When running with --scale api=N, Docker DNS resolves 'api' to all replicas
        keepalive 32;             # reuse TCP connections to upstream workers
    }

    server {
        listen 80;
        server_name _;

        # Forward all traffic to FastAPI
        location / {
            proxy_pass         http://housing_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";   # enable keepalive upstream
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Timeouts generous enough for large batch predictions
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # Health check endpoint — no logging noise
        location /health {
            proxy_pass         http://housing_api/health;
            access_log         off;
        }
    }
}